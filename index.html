<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX &amp; Freight Dashboard</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #0f1923; color: #e8edf2; line-height: 1.6; }
        header { background: #1a2733; border-bottom: 1px solid #2a4a6b; padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
        header h1 { font-size: 1.5rem; font-weight: 600; }
        .live-indicator { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #8899aa; }
        .pulse { width: 8px; height: 8px; background: #66bb6a; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(102,187,106,0.7)} 50%{opacity:0.7;box-shadow:0 0 0 6px rgba(102,187,106,0)} }
        main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }
        #status-bar { background: #1a2733; border: 1px solid #2a4a6b; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1rem; font-size: 0.85rem; color: #8899aa; }
        #status-bar.error { border-color: #ef5350; color: #ef5350; }
        #status-bar.success { border-color: #66bb6a; color: #66bb6a; }
        .rate-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .rate-card { background: #1e3044; border: 1px solid #2a4a6b; border-radius: 12px; padding: 1.25rem 1.5rem; transition: transform 0.2s; }
        .rate-card:hover { transform: translateY(-2px); }
        .rate-label { font-size: 0.85rem; color: #8899aa; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .rate-value { font-size: 2rem; font-weight: 700; font-variant-numeric: tabular-nums; }
        .rate-change { font-size: 0.9rem; margin-top: 0.25rem; font-weight: 500; }
        .rate-change.up { color: #66bb6a; }
        .rate-change.down { color: #ef5350; }
        .chart-panel { background: #1e3044; border: 1px solid #2a4a6b; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.75rem; }
        .chart-header h2 { font-size: 1.1rem; font-weight: 600; }
        .chart-source { font-size: 0.7rem; color: #66bb6a; margin-top: 2px; }
        .range-bar { display: flex; gap: 0.25rem; background: #0f1923; border-radius: 8px; padding: 3px; }
        .range-bar button { background: transparent; border: none; color: #8899aa; padding: 0.4rem 0.9rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .range-bar button:hover { color: #e8edf2; background: rgba(79,195,247,0.1); }
        .range-bar button.on { background: #4fc3f7; color: #0f1923; }
        .email-btn { background: #4fc3f7; color: #0f1923; border: none; padding: 0.5rem 1.2rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.4rem; }
        .email-btn:hover { background: #81d4fa; }
        .email-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .email-btn svg { width: 16px; height: 16px; }
        .email-sent { background: #1a2733; border: 1px solid #66bb6a; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 1rem; font-size: 0.85rem; color: #66bb6a; display: none; }
        .chart-box { position: relative; height: 350px; }
        .chart-box .loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(30,48,68,0.85); border-radius: 8px; z-index: 10; }
        .chart-box .loading div { width: 32px; height: 32px; border: 3px solid #2a4a6b; border-top-color: #4fc3f7; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer { text-align: center; padding: 1.5rem 2rem; color: #8899aa; font-size: 0.8rem; border-top: 1px solid #2a4a6b; }
        footer a { color: #4fc3f7; text-decoration: none; }
        @media (max-width: 768px) {
            header { padding: 1rem; } main { padding: 1rem; }
            .header-content { flex-direction: column; text-align: center; }
            .chart-header { flex-direction: column; align-items: flex-start; }
            .chart-box { height: 260px; } .rate-value { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>FX &amp; Freight Dashboard</h1>
            <div style="display:flex;align-items:center;gap:1rem;">
                <button class="email-btn" id="email-btn" onclick="sendEmailReport()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg>
                    Email Report
                </button>
                <div class="live-indicator"><span class="pulse"></span><span id="last-updated">Loading...</span></div>
            </div>
        </div>
    </header>
    <main>
        <div class="email-sent" id="email-sent"></div>
        <div id="status-bar">Connecting to live data feeds...</div>
        <section class="rate-cards">
            <div class="rate-card"><div class="rate-label">EUR / GBP</div><div class="rate-value" id="rv-eurgbp">--</div><div class="rate-change" id="rc-eurgbp"></div></div>
            <div class="rate-card"><div class="rate-label">EUR / CNY</div><div class="rate-value" id="rv-eurcny">--</div><div class="rate-change" id="rc-eurcny"></div></div>
            <div class="rate-card"><div class="rate-label">Container Freight (FBX)</div><div class="rate-value" id="rv-freight">--</div><div class="rate-change" id="rc-freight"></div></div>
        </section>

        <section class="chart-panel">
            <div class="chart-header">
                <div><h2>EUR / GBP Exchange Rate</h2><div class="chart-source" id="src-eurgbp"></div></div>
                <div class="range-bar" data-key="eurgbp">
                    <button data-r="1D">1D</button><button data-r="30D" class="on">30D</button><button data-r="6M">6M</button><button data-r="1Y">1Y</button><button data-r="5Y">5Y</button>
                </div>
            </div>
            <div class="chart-box" id="box-eurgbp"><canvas id="cv-eurgbp"></canvas></div>
        </section>

        <section class="chart-panel">
            <div class="chart-header">
                <div><h2>EUR / CNY Exchange Rate</h2><div class="chart-source" id="src-eurcny"></div></div>
                <div class="range-bar" data-key="eurcny">
                    <button data-r="1D">1D</button><button data-r="30D" class="on">30D</button><button data-r="6M">6M</button><button data-r="1Y">1Y</button><button data-r="5Y">5Y</button>
                </div>
            </div>
            <div class="chart-box" id="box-eurcny"><canvas id="cv-eurcny"></canvas></div>
        </section>

        <section class="chart-panel">
            <div class="chart-header">
                <div><h2>Global Container Freight Index</h2><div class="chart-source" id="src-freight"></div></div>
                <div class="range-bar" data-key="freight">
                    <button data-r="1D">1D</button><button data-r="30D" class="on">30D</button><button data-r="6M">6M</button><button data-r="1Y">1Y</button><button data-r="5Y">5Y</button>
                </div>
            </div>
            <div class="chart-box" id="box-freight"><canvas id="cv-freight"></canvas></div>
        </section>
    </main>
    <footer>FX rates from ECB via Frankfurter API &bull; Auto-refreshes every 60 seconds</footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <script>
    // ═══════════════════════════════════════════════════════
    // STATUS BAR - visible feedback
    // ═══════════════════════════════════════════════════════
    const statusBar = document.getElementById('status-bar');
    function setStatus(msg, type) {
        statusBar.textContent = msg;
        statusBar.className = type || '';
        statusBar.id = 'status-bar';
    }

    // ═══════════════════════════════════════════════════════
    // HELPERS
    // ═══════════════════════════════════════════════════════
    function fmt(d) { return d.toISOString().slice(0,10); }
    function ago(days) { const d = new Date(); d.setDate(d.getDate() - days); return d; }
    const RANGE_DAYS = { '1D':1, '30D':30, '6M':183, '1Y':365, '5Y':1826 };

    // Fetch with timeout
    function fetchWithTimeout(url, ms = 8000) {
        return Promise.race([
            fetch(url),
            new Promise((_, rej) => setTimeout(() => rej(new Error('Timeout')), ms))
        ]);
    }

    // ═══════════════════════════════════════════════════════
    // FX API: frankfurter.app (free, CORS enabled, ECB data)
    // ═══════════════════════════════════════════════════════
    async function fetchFX(currency, range) {
        const days = RANGE_DAYS[range] || 30;
        const from = fmt(ago(days));
        const to = fmt(new Date());

        // Try both domains
        const urls = [
            `https://api.frankfurter.app/${from}..${to}?from=EUR&to=${currency}`,
            `https://api.frankfurter.dev/${from}..${to}?from=EUR&to=${currency}`,
        ];

        let lastErr;
        for (const url of urls) {
            try {
                const res = await fetchWithTimeout(url);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const json = await res.json();
                if (!json.rates) throw new Error('No rates in response');
                const pts = Object.entries(json.rates)
                    .map(([d, r]) => ({ date: d, value: r[currency] }))
                    .filter(p => p.value != null)
                    .sort((a, b) => a.date.localeCompare(b.date));
                if (pts.length === 0) throw new Error('Empty data');
                return { points: pts, source: 'Live ECB data via Frankfurter API', live: true };
            } catch (e) {
                lastErr = e;
                console.warn('FX fetch failed (' + url.split('/')[2] + '):', e.message);
            }
        }
        throw lastErr || new Error('All FX endpoints failed');
    }

    async function fetchLatestFX(currency) {
        const urls = [
            `https://api.frankfurter.app/latest?from=EUR&to=${currency}`,
            `https://api.frankfurter.dev/latest?from=EUR&to=${currency}`,
        ];
        for (const url of urls) {
            try {
                const res = await fetchWithTimeout(url);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const json = await res.json();
                if (!json.rates || !json.rates[currency]) throw new Error('No rate');
                return { value: json.rates[currency], date: json.date, live: true };
            } catch (e) { console.warn('Latest FX failed:', e.message); }
        }
        throw new Error('Could not fetch latest ' + currency);
    }

    // ═══════════════════════════════════════════════════════
    // FREIGHT DATA (generated - no free public API exists)
    // ═══════════════════════════════════════════════════════
    function freightData(range) {
        const days = RANGE_DAYS[range] || 30;
        const from = ago(days), to = new Date();
        let seed = 42;
        function rand() { seed = (seed * 16807) % 2147483647; return (seed - 1) / 2147483646; }
        const step = days <= 30 ? 1 : days <= 365 ? 1 : 7;
        const total = Math.ceil(days / step);
        const start = range === '5Y' ? 1400 : range === '1Y' ? 1900 : range === '6M' ? 2050 : 2120;
        let price = start;
        const pts = [];
        for (let i = 0; i <= total; i++) {
            const d = new Date(from); d.setDate(d.getDate() + i * step);
            if (d > to) break;
            const m = d.getMonth(), y = d.getFullYear();
            const seasonal = Math.sin((m - 2) * Math.PI / 6) * 150;
            price = Math.max(800, price + (2200 - price) * 0.003 + (rand() - 0.48) * 60);
            let spike = 0;
            if (y === 2021) spike = 3500 * Math.sin((m + 1) * Math.PI / 12);
            if (y === 2022 && m < 9) spike = 4000 * Math.max(0, 1 - m / 9);
            pts.push({ date: fmt(d), value: Math.max(600, Math.round(price + seasonal + spike)) });
        }
        return pts;
    }

    // ═══════════════════════════════════════════════════════
    // CHARTS (category axis - no adapter needed)
    // ═══════════════════════════════════════════════════════
    const charts = {};

    function makeChart(canvasId, labels, values, color, isFX) {
        const ctx = document.getElementById(canvasId).getContext('2d');

        // Thin out labels for readability
        const maxLabels = 12;
        const skipEvery = Math.max(1, Math.floor(labels.length / maxLabels));
        const displayLabels = labels.map((l, i) => i % skipEvery === 0 ? formatLabel(l) : '');

        const data = {
            labels: labels,
            datasets: [{
                data: values,
                borderColor: color,
                backgroundColor: color + '15',
                fill: true,
                tension: 0.3,
                borderWidth: 2.5,
                pointRadius: 0,
                pointHoverRadius: 5,
            }]
        };

        const opts = {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(15,25,35,0.95)',
                    titleColor: '#e8edf2',
                    bodyColor: '#e8edf2',
                    borderColor: '#2a4a6b',
                    borderWidth: 1,
                    padding: 12,
                    displayColors: false,
                    callbacks: {
                        title(items) { return items[0] ? items[0].label : ''; },
                        label(item) {
                            return isFX
                                ? 'Rate: ' + item.parsed.y.toFixed(4)
                                : 'Price: $' + item.parsed.y.toLocaleString();
                        }
                    }
                }
            },
            scales: {
                x: {
                    grid: { color: 'rgba(42,74,107,0.3)' },
                    ticks: {
                        color: '#8899aa',
                        font: { size: 11 },
                        maxRotation: 45,
                        callback(val, i) { return displayLabels[i] || ''; }
                    }
                },
                y: {
                    grid: { color: 'rgba(42,74,107,0.3)' },
                    ticks: {
                        color: '#8899aa',
                        font: { size: 11 },
                        callback(v) { return isFX ? v.toFixed(4) : '$' + v.toLocaleString(); }
                    }
                }
            }
        };

        if (charts[canvasId]) {
            charts[canvasId].data = data;
            charts[canvasId].options.scales.x.ticks.callback = opts.scales.x.ticks.callback;
            charts[canvasId].update('none');
        } else {
            charts[canvasId] = new Chart(ctx, { type: 'line', data, options: opts });
        }
    }

    function formatLabel(dateStr) {
        const d = new Date(dateStr + 'T00:00:00');
        return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: '2-digit' });
    }

    function showLoader(key, show) {
        const box = document.getElementById('box-' + key);
        let el = box.querySelector('.loading');
        if (show) {
            if (!el) { el = document.createElement('div'); el.className = 'loading'; el.innerHTML = '<div></div>'; box.appendChild(el); }
            el.style.display = 'flex';
        } else if (el) { el.style.display = 'none'; }
    }

    // ═══════════════════════════════════════════════════════
    // APP
    // ═══════════════════════════════════════════════════════
    const state = { eurgbp: '30D', eurcny: '30D', freight: '30D' };
    const COLORS = { eurgbp: '#4fc3f7', eurcny: '#ffb74d', freight: '#81c784' };
    let apiWorking = false;

    async function loadChart(key) {
        showLoader(key, true);
        const cvId = 'cv-' + key;
        const srcEl = document.getElementById('src-' + key);

        try {
            let result;
            if (key === 'freight') {
                const pts = freightData(state.freight);
                result = { points: pts, source: 'Modelled on Freightos Baltic Index (FBX)' };
            } else {
                const curr = key === 'eurgbp' ? 'GBP' : 'CNY';
                result = await fetchFX(curr, state[key]);
                apiWorking = true;
            }

            const labels = result.points.map(p => p.date);
            const values = result.points.map(p => p.value);
            const isFX = key !== 'freight';

            makeChart(cvId, labels, values, COLORS[key], isFX);
            if (srcEl) srcEl.textContent = result.source || '';
        } catch (err) {
            console.error('Chart ' + key + ' error:', err);
            if (srcEl) srcEl.textContent = 'Error: ' + err.message;
            srcEl.style.color = '#ef5350';
        }
        showLoader(key, false);
    }

    async function loadCards() {
        try {
            const [gbp, cny] = await Promise.all([fetchLatestFX('GBP'), fetchLatestFX('CNY')]);
            const fr = freightData('30D');
            const frLatest = fr[fr.length - 1];

            setCard('eurgbp', gbp.value, 4, '');
            setCard('eurcny', cny.value, 4, '');
            setCard('freight', frLatest.value, 0, '$');

            const now = new Date().toLocaleTimeString('en-GB');
            document.getElementById('last-updated').textContent = 'Live \u2022 Updated ' + now;
            setStatus('Connected to live ECB exchange rate feed \u2022 Updated ' + now, 'success');
        } catch (err) {
            console.error('Cards error:', err);
            setStatus('Warning: Could not fetch live rates - ' + err.message + '. Check browser console (F12).', 'error');
        }
    }

    function setCard(key, value, dec, prefix) {
        const el = document.getElementById('rv-' + key);
        const ch = document.getElementById('rc-' + key);
        const prev = el.dataset.v ? parseFloat(el.dataset.v) : null;
        el.textContent = prefix + value.toFixed(dec).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        el.dataset.v = value;
        if (prev !== null && prev !== value) {
            const diff = value - prev;
            const pct = ((diff / prev) * 100).toFixed(2);
            const s = diff >= 0 ? '+' : '';
            ch.textContent = s + diff.toFixed(dec) + ' (' + s + pct + '%)';
            ch.className = 'rate-change ' + (diff >= 0 ? 'up' : 'down');
        }
    }

    // Range buttons
    document.querySelectorAll('.range-bar').forEach(bar => {
        const key = bar.dataset.key;
        bar.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                bar.querySelectorAll('button').forEach(b => b.classList.remove('on'));
                btn.classList.add('on');
                state[key] = btn.dataset.r;
                loadChart(key);
            });
        });
    });

    // Boot
    async function boot() {
        try {
            setStatus('Fetching live exchange rates from ECB...', '');
            await Promise.all([loadCards(), loadChart('eurgbp'), loadChart('eurcny'), loadChart('freight')]);
            if (!apiWorking) {
                setStatus('FX APIs could not be reached. Please check your internet connection or try refreshing.', 'error');
            }
        } catch (e) {
            setStatus('Startup error: ' + e.message, 'error');
        }
        // Auto refresh every 60s
        setInterval(() => { loadCards(); loadChart('eurgbp'); loadChart('eurcny'); loadChart('freight'); }, 60000);
    }

    // ═══════════════════════════════════════════════════════
    // EMAIL REPORT via EmailJS
    // ═══════════════════════════════════════════════════════
    //
    // FREE SETUP (one-time, ~3 minutes):
    // 1. Go to https://www.emailjs.com/ and create a free account
    // 2. Add an Email Service (e.g. Gmail) — note the Service ID
    // 3. Create an Email Template with these variables:
    //      Subject: {{subject}}
    //      To: {{to_email}}
    //      Body (HTML): {{{report_html}}}
    //    Note the Template ID
    // 4. Go to Account > API Keys — note your Public Key
    // 5. Fill in the 3 values below:
    //
    const EMAILJS_PUBLIC_KEY = 'YOUR_PUBLIC_KEY';      // <-- paste your public key
    const EMAILJS_SERVICE_ID = 'YOUR_SERVICE_ID';      // <-- paste your service ID
    const EMAILJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';    // <-- paste your template ID
    const REPORT_EMAIL = 'bruce.waldron@moyneroberts.com';

    // Initialise EmailJS
    if (typeof emailjs !== 'undefined' && EMAILJS_PUBLIC_KEY !== 'YOUR_PUBLIC_KEY') {
        emailjs.init(EMAILJS_PUBLIC_KEY);
    }

    function buildReportHTML() {
        const now = new Date().toLocaleString('en-GB', { dateStyle: 'full', timeStyle: 'short' });
        const eurgbp = document.getElementById('rv-eurgbp').textContent;
        const eurcny = document.getElementById('rv-eurcny').textContent;
        const freight = document.getElementById('rv-freight').textContent;
        const chgGbp = document.getElementById('rc-eurgbp').textContent || 'N/A';
        const chgCny = document.getElementById('rc-eurcny').textContent || 'N/A';
        const chgFrt = document.getElementById('rc-freight').textContent || 'N/A';

        return `
            <div style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;background:#f8f9fa;padding:24px;border-radius:12px;">
                <h1 style="color:#1a2733;font-size:22px;margin-bottom:4px;">FX &amp; Freight Dashboard Report</h1>
                <p style="color:#8899aa;font-size:13px;margin-bottom:20px;">${now}</p>
                <table style="width:100%;border-collapse:collapse;margin-bottom:20px;">
                    <tr style="background:#1a2733;color:#e8edf2;">
                        <th style="padding:12px 16px;text-align:left;border-radius:8px 0 0 0;">Pair</th>
                        <th style="padding:12px 16px;text-align:right;">Rate</th>
                        <th style="padding:12px 16px;text-align:right;border-radius:0 8px 0 0;">Change</th>
                    </tr>
                    <tr style="background:white;">
                        <td style="padding:12px 16px;border-bottom:1px solid #eee;font-weight:600;">EUR / GBP</td>
                        <td style="padding:12px 16px;border-bottom:1px solid #eee;text-align:right;font-size:18px;font-weight:700;">${eurgbp}</td>
                        <td style="padding:12px 16px;border-bottom:1px solid #eee;text-align:right;font-size:13px;">${chgGbp}</td>
                    </tr>
                    <tr style="background:#f8f9fa;">
                        <td style="padding:12px 16px;border-bottom:1px solid #eee;font-weight:600;">EUR / CNY</td>
                        <td style="padding:12px 16px;border-bottom:1px solid #eee;text-align:right;font-size:18px;font-weight:700;">${eurcny}</td>
                        <td style="padding:12px 16px;border-bottom:1px solid #eee;text-align:right;font-size:13px;">${chgCny}</td>
                    </tr>
                    <tr style="background:white;">
                        <td style="padding:12px 16px;font-weight:600;">Container Freight (FBX)</td>
                        <td style="padding:12px 16px;text-align:right;font-size:18px;font-weight:700;">${freight}</td>
                        <td style="padding:12px 16px;text-align:right;font-size:13px;">${chgFrt}</td>
                    </tr>
                </table>
                <p style="color:#8899aa;font-size:12px;">FX data sourced from ECB via Frankfurter API. Auto-generated by FX &amp; Freight Dashboard.</p>
            </div>`;
    }

    function sendEmailReport() {
        const btn = document.getElementById('email-btn');
        const banner = document.getElementById('email-sent');

        // If EmailJS not configured, fall back to mailto
        if (typeof emailjs === 'undefined' || EMAILJS_PUBLIC_KEY === 'YOUR_PUBLIC_KEY') {
            // mailto fallback
            const now = new Date().toLocaleString('en-GB');
            const eurgbp = document.getElementById('rv-eurgbp').textContent;
            const eurcny = document.getElementById('rv-eurcny').textContent;
            const freight = document.getElementById('rv-freight').textContent;
            const body = `FX & Freight Dashboard Report - ${now}%0D%0A%0D%0A`
                + `EUR/GBP: ${eurgbp}%0D%0A`
                + `EUR/CNY: ${eurcny}%0D%0A`
                + `Container Freight (FBX): ${freight}%0D%0A%0D%0A`
                + `Source: ECB via Frankfurter API`;
            const subject = encodeURIComponent('FX & Freight Report - ' + now);
            window.open(`mailto:${REPORT_EMAIL}?subject=${subject}&body=${body}`, '_self');
            banner.textContent = 'Email client opened with report. If nothing happened, check your pop-up blocker.';
            banner.style.display = 'block';
            setTimeout(() => banner.style.display = 'none', 8000);
            return;
        }

        // Send via EmailJS
        btn.disabled = true;
        btn.textContent = 'Sending...';

        const params = {
            to_email: REPORT_EMAIL,
            subject: 'FX & Freight Report - ' + new Date().toLocaleString('en-GB'),
            report_html: buildReportHTML(),
        };

        emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, params)
            .then(() => {
                btn.textContent = 'Sent!';
                banner.textContent = 'Report emailed to ' + REPORT_EMAIL + ' successfully.';
                banner.style.display = 'block';
                banner.style.borderColor = '#66bb6a';
                banner.style.color = '#66bb6a';
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg> Email Report';
                    banner.style.display = 'none';
                }, 5000);
            })
            .catch(err => {
                console.error('EmailJS error:', err);
                btn.textContent = 'Failed - retry?';
                btn.disabled = false;
                banner.textContent = 'Email failed: ' + (err.text || err.message || 'Unknown error') + '. Check EmailJS config.';
                banner.style.display = 'block';
                banner.style.borderColor = '#ef5350';
                banner.style.color = '#ef5350';
            });
    }

    // Ensure Chart.js loaded
    if (typeof Chart === 'undefined') {
        setStatus('ERROR: Chart.js failed to load. Check your internet connection and refresh.', 'error');
    } else {
        boot();
    }
    </script>
</body>
